<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - XD SMS Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;">
        <a href="index.html" class="logo">XD SMS <span>Gateway</span></a>
        <button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle theme">
          <svg data-theme-icon-sun width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg data-theme-icon-moon width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <div style="width:48px;height:48px;border-radius:12px;background:var(--bg-muted);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:20px;">🔒</div>
      <h1>Set new password</h1>
      <p class="subtitle">Enter the reset token from your email and choose a new password.</p>
      <div id="alertBox" hidden></div>
      <form id="resetForm" class="form-stack">
        <div>
          <label class="label" for="token">Reset token</label>
          <input class="input" type="text" id="token" placeholder="Paste token from email" required autocomplete="off">
        </div>
        <div>
          <label class="label" for="password">New password</label>
          <input class="input" type="password" id="password" placeholder="Min. 6 characters" minlength="6" required autocomplete="new-password">
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:4px;">Reset password</button>
      </form>
      <div class="form-footer">
        <a href="login.html">Back to sign in</a>
      </div>
      <div class="form-footer" style="margin-top:12px;color:var(--text-muted);font-size:12px;">© 2026 TeamXD by NabeelXD</div>
    </div>
  </div>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/firebase-auth.js"></script>
  <script>
    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById("alertBox");
      alertBox.hidden = true;

      const token = document.getElementById("token").value.trim();
      const password = document.getElementById("password").value;
      const btn = e.target.querySelector("button[type=submit]");
      const btnText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "Resetting…";

      try {
        const { response, data } = await window.XD_SMS.resetPassword(token, password);

        if (response.ok) {
          alertBox.hidden = false;
          alertBox.className = "alert alert-success";
          alertBox.textContent = data?.message || "Password reset successful. You can now sign in.";
          setTimeout(() => { window.location.href = "login.html"; }, 1500);
          return;
        }

        alertBox.hidden = false;
        alertBox.className = "alert alert-error";
        alertBox.textContent = data?.error || "Failed to reset password";
      } catch (err) {
        alertBox.hidden = false;
        alertBox.className = "alert alert-error";
        alertBox.textContent = err.message || "Failed to reset password";
      } finally {
        btn.disabled = false;
        btn.textContent = btnText;
      }
    });
  </script>
</body>
</html>
