<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>End-to-End Testing Checklist - XD SMS Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body>
  <div style="max-width:860px;margin:0 auto;padding:48px 24px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <a href="index.html" class="logo">XD SMS <span>Gateway</span></a>
      <button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle theme">
        <svg data-theme-icon-sun width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg data-theme-icon-moon width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>

    <div class="card" style="padding:32px;">
      <h1 style="margin:0 0 8px;">End-to-End Testing Checklist</h1>
      <p style="color:var(--text-secondary);margin:0 0 24px;">Walk through this checklist after every deploy to verify all critical flows.</p>

      <div id="progressBar" style="height:6px;border-radius:999px;background:var(--bg-muted);overflow:hidden;margin-bottom:32px;">
        <div id="progressFill" style="height:100%;width:0%;background:var(--primary);transition:width .2s;"></div>
      </div>

      <ol id="checklist" style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:14px;"></ol>

      <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border);color:var(--text-muted);font-size:13px;">
        © 2026 TeamXD by NabeelXD
      </div>
    </div>
  </div>

  <script>
    const steps = [
      { id: 'register', title: 'Register a new account', hint: 'Go to register.html, submit valid email + password, receive Firebase verification email.' },
      { id: 'login', title: 'Login with credentials', hint: 'Sign in via login.html; you land on dashboard.html and the sidebar shows your email.' },
      { id: 'forgot', title: 'Password reset flow', hint: 'Click "Forgot password" on login page, submit email, receive Firebase reset link, set a new password, sign in again.' },
      { id: 'apikey', title: 'Create an API key', hint: 'On apikeys.html, click "Create API Key", copy the returned key exactly once.' },
      { id: 'device', title: 'Connect an Android device', hint: 'Install the companion app, paste the API key, verify device appears "online" on devices.html.' },
      { id: 'send', title: 'Send a test SMS', hint: 'From send.html, target your own number. Confirm SMS delivery on the phone.' },
      { id: 'webhook', title: 'Configure and receive a webhook', hint: 'Add a webhook URL on webhooks.html and confirm a POST hits it after status changes.' },
      { id: 'logs', title: 'Inspect logs', hint: 'On logs.html, verify sms_queued and sms_sent (or sms_failed) events appear with your request_id.' },
      { id: 'suspend', title: 'Suspension enforcement (admin)', hint: 'From secure-login, suspend a test user. Their next API request must return 403 "Account suspended".' },
      { id: 'audit', title: 'Audit logs visible', hint: 'On the admin panel, confirm login attempts, api-key creation, and admin actions appear in System Logs.' },
      { id: 'logout', title: 'Logout', hint: 'Click "Sign out". Session is cleared and login page loads.' }
    ];

    const list = document.getElementById('checklist');
    const fill = document.getElementById('progressFill');
    const storageKey = 'xd_sms_test_checklist';
    const state = JSON.parse(localStorage.getItem(storageKey) || '{}');

    function updateProgress() {
      const done = steps.filter((s) => state[s.id]).length;
      fill.style.width = ((done / steps.length) * 100) + '%';
    }

    steps.forEach((s, idx) => {
      const li = document.createElement('li');
      li.style.cssText = 'display:flex;gap:12px;padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--bg-elevated);';
      li.innerHTML = `
        <input type="checkbox" id="chk-${s.id}" ${state[s.id] ? 'checked' : ''} style="margin-top:4px;width:18px;height:18px;flex-shrink:0;">
        <label for="chk-${s.id}" style="cursor:pointer;flex:1;">
          <div style="font-weight:600;color:var(--text-primary);">${idx + 1}. ${s.title}</div>
          <div style="color:var(--text-secondary);font-size:13px;margin-top:4px;">${s.hint}</div>
        </label>`;
      list.appendChild(li);
      li.querySelector('input').addEventListener('change', (e) => {
        state[s.id] = e.target.checked;
        localStorage.setItem(storageKey, JSON.stringify(state));
        updateProgress();
      });
    });
    updateProgress();
  </script>
</body>
</html>
