<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send SMS - XD SMS Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand"><strong>XD SMS Gateway</strong><span data-user-email></span></div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" data-page="dashboard">Dashboard</a>
        <a href="send.html" data-page="send">Send SMS</a>
        <a href="devices.html" data-page="devices">Devices</a>
        <a href="apikeys.html" data-page="apikeys">API Keys</a>
        <a href="webhooks.html" data-page="webhooks">Webhooks</a>
        <a href="logs.html" data-page="logs">Logs</a>
        <a href="settings.html" data-page="settings">Settings</a>
        <a href="docs.html" data-page="docs">API Docs</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary theme-btn" style="width:100%;margin-bottom:8px;" data-theme-toggle type="button"><svg data-theme-icon-sun width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg><svg data-theme-icon-moon width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span>Theme</span></button>
        <button class="btn btn-secondary" style="width:100%;" data-logout type="button">Sign out</button>
      </div>
    </aside>
    <main class="main-content">
      <div class="page-header">
        <div>
          <button class="btn btn-secondary btn-sm mobile-menu-btn" data-mobile-menu type="button">Menu</button>
          <h1>Send SMS</h1>
          <p>Queue a manual test message through your connected gateway.</p>
        </div>
      </div>

      <div class="grid-2">
        <div class="card panel">
          <form id="sendForm" class="form-stack">
            <div>
              <label class="label" for="phoneNumber">Phone number</label>
              <input class="input" id="phoneNumber" placeholder="9876543210" required>
            </div>
            <div>
              <label class="label" for="simSlot">SIM slot</label>
              <select class="select" id="simSlot">
                <option value="1">SIM 1</option>
                <option value="2">SIM 2</option>
              </select>
            </div>
            <div>
              <label class="label" for="message">Message</label>
              <textarea class="textarea" id="message" rows="5" required></textarea>
            </div>
            <button class="btn btn-primary" type="submit">Queue SMS</button>
          </form>
          <div id="sendResult" style="margin-top:16px;"></div>
        </div>
        <div class="card panel">
          <h2>Current queue</h2>
          <div id="queueList" class="log-list"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/send.js"></script>
</body>
</html>
