<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - XD SMS Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.0/firebase-auth-compat.js"></script>
</head>
<body>
  <div class="auth-page">
    <div class="card auth-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;">
        <a href="index.html" class="logo">XD SMS <span>Gateway</span></a>
        <button class="theme-toggle" data-theme-toggle type="button" aria-label="Toggle theme"><svg data-theme-icon-sun width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg><svg data-theme-icon-moon width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to your gateway dashboard.</p>
      <div id="alertBox" hidden></div>
      <form id="loginForm" class="form-stack">
        <div>
          <label class="label" for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <label class="label" for="password" style="margin-bottom:0;">Password</label>
            <a href="forgot-password.html" style="font-size:13px;color:var(--text-muted);">Forgot password?</a>
          </div>
          <input class="input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:4px;">Sign in</button>
      </form>
      <div class="form-footer">
        No account yet? <a href="register.html">Create one</a>
      </div>
      <div class="form-footer" style="margin-top:12px;color:var(--text-muted);font-size:12px;">© 2026 TeamXD by NabeelXD</div>
    </div>
  </div>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/firebase-auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
