<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hosting - Discord Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        .logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2rem;
        }
        p {
            color: #718096;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }
        .discord-btn {
            background: #5865F2;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }
        .discord-btn:hover {
            background: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.4);
        }
        .features {
            margin-top: 40px;
            text-align: left;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #4a5568;
        }
        .feature-icon {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🔐</div>
        <h1>Nexus Hosting</h1>
        <p>Login with Discord to access your dashboard</p>
        <a href="/auth/discord/login" class="discord-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">

            </svg>
            Login with Discord
        </a>
        <div class="features">
            <div class="feature">
                <span class="feature-icon">✅</span>
                <span>Secure Discord Authentication</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🚀</span>
                <span>Instant Server Access</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <span>Your Data is Protected</span>
            </div>
        </div>
    </div>
</body>
</html>
